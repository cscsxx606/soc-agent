# 权限提升事件响应预案

## 自动执行

1. **收集 sudo/su 操作的详细日志**
2. **记录切换时间和执行的操作**

## 人工审批后执行（紧急）

3. **禁用涉事用户账号**
4. **强制密码重置**
5. **隔离主机**（如确认是恶意提权）

## 调查

- 用户账号是否被盗
- 是否有横向移动迹象
- 是否安装了后门/计划任务
- 是否修改了系统配置

## 通知

- 安全团队
- IT 运维
- 用户所属部门负责人
- HR（若为内部恶意行为）

## 检查项

- [ ] 是否需要重启用账号（如确认是误操作）
- [ ] 是否需要回滚用户的修改操作
- [ ] 是否存在 APT 长期驻留迹象
- [ ] 是否需要做主机取证分析

