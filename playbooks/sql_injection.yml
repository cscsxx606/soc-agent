# SQL 注入响应预案

## 自动执行

1. **阻断攻击源 IP**（WAF 黑名单）
2. **收集 WAF 日志和访问日志**
3. **检查数据库审计日志**（是否有可疑查询）

## 人工审批后执行

4. **隔离受影响的 Web 服务器**
5. **暂停 API 服务**（如已确认数据泄露）
6. **重置受影响数据库账号**

## 紧急检查

- 是否成功 SQL 注入（检查数据库慢查询日志）
- 是否数据外泄（检查异常出向流量）
- 是否横向移动（检查 Web 服务器的后续操作）

## 通知

- 安全团队
- DBA 团队
- 业务团队负责人
- 法务（确认是否需要报告监管）

## 回滚

- 解除 WAF 黑名单（攻击者使用代理 IP 时可能需要）

## 检查项

- [ ] 漏洞是否已修复（参数化查询/WAF 规则）
- [ ] 数据库账号是否需要重置
- [ ] 是否需要做渗透测试复测
- [ ] 是否触发 SOC 2/合规报告流程

