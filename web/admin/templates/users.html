{% extends "base.html" %}
{% block title %}用户管理{% endblock %}
{% block page_title %}用户管理{% endblock %}

{% block content %}
<!-- 统计卡片 -->
<div class="stat-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px;">
    <div class="stat-card">
        <div class="label">总用户</div>
        <div class="value" id="stat-total">-</div>
    </div>
    <div class="stat-card success">
        <div class="label">活跃</div>
        <div class="value" id="stat-active">-</div>
    </div>
    <div class="stat-card warning">
        <div class="label">管理员</div>
        <div class="value" id="stat-admin">-</div>
    </div>
    <div class="stat-card danger">
        <div class="label">禁用</div>
        <div class="value" id="stat-inactive">-</div>
    </div>
</div>

<div class="panel" style="padding:16px 20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
        <div style="display:flex;align-items:center;gap:8px;">
            <input type="text" id="user-search" placeholder="🔍 搜索用户名/邮箱..." style="width:220px;" onkeyup="if(event.key==='Enter')loadUsers()">
            <select id="role-filter" style="width:140px;" onchange="loadUsers()">
                <option value="">所有角色</option>
                <option value="admin">👑 管理员</option>
                <option value="analyst">🔍 分析师</option>
                <option value="auditor">📜 审计员</option>
                <option value="viewer">👁️ 只读</option>
            </select>
        </div>
        <div style="display:flex;gap:8px;">
            <button class="success" onclick="showAddUserModal()">➕ 新增用户</button>
            <button class="small" onclick="loadUsers()">🔄 刷新</button>
        </div>
    </div>
</div>

<div class="panel">
    <h3>👥 用户列表</h3>
    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th><input type="checkbox" id="select-all" onclick="toggleSelectAll()"></th>
                    <th>用户</th>
                    <th>姓名</th>
                    <th>邮箱</th>
                    <th>角色</th>
                    <th>状态</th>
                    <th>上次登录</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="users-tbody">
                <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-muted);">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const roleConfig = {
    admin: { label: '👑 管理员', color: 'var(--danger)', desc: '全部权限' },
    analyst: { label: '🔍 分析师', color: 'var(--accent)', desc: '告警/狩猎/响应' },
    auditor: { label: '📜 审计员', color: 'var(--purple)', desc: '只读 + 审计日志' },
    viewer: { label: '👁️ 只读', color: 'var(--text-muted)', desc: '只读访问' }
};

async function loadUsers() {
    showLoading('#users-tbody', 8);
    const search = document.getElementById('user-search').value.toLowerCase();
    const roleFilter = document.getElementById('role-filter').value;
    
    try {
        const res = await api('/api/admin/users/list');
        if (!res || !res.success) {
            showError('#users-tbody', 8, (res && res.error) || '加载失败');
            return;
        }
        
        let users = res.users || [];
        
        // 客户端筛选
        if (search) {
            users = users.filter(u => 
                (u.username || '').toLowerCase().includes(search) ||
                (u.email || '').toLowerCase().includes(search) ||
                (u.full_name || '').toLowerCase().includes(search)
            );
        }
        if (roleFilter) {
            users = users.filter(u => u.role === roleFilter);
        }
        
        // 更新统计
        updateStats(res.users || []);
        
        const tbody = document.getElementById('users-tbody');
        if (!users.length) {
            showEmpty('#users-tbody', 8, '暂无用户');
            return;
        }
        
        tbody.innerHTML = users.map((u, idx) => {
            const rc = roleConfig[u.role] || { label: u.role, color: 'var(--text-muted)' };
            return `
                <tr style="animation:fadeIn 0.3s ${idx*0.05}s both;">
                    <td><input type="checkbox" class="row-select" value="${u.id}"></td>
                    <td>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <div style="width:32px;height:32px;border-radius:50%;background:${rc.color}22;display:flex;align-items:center;justify-content:center;font-size:14px;">
                                ${(u.full_name || u.username || '?').charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <strong>${escapeHtml(u.username)}</strong>
                                <div style="font-size:11px;color:var(--text-muted);">ID: ${escapeHtml(u.id)}</div>
                            </div>
                        </div>
                    </td>
                    <td>${escapeHtml(u.full_name || '-')}</td>
                    <td><a href="mailto:${escapeHtml(u.email)}" style="color:var(--accent);">${escapeHtml(u.email || '-')}</a></td>
                    <td>
                        <span class="badge" style="background:${rc.color}22;color:${rc.color};border:1px solid ${rc.color}44;">${rc.label}</span>
                        <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${rc.desc}</div>
                    </td>
                    <td>
                        <label class="toggle" style="--toggle-bg:${u.is_active ? 'var(--success)' : 'var(--danger)'};">
                            <input type="checkbox" ${u.is_active ? 'checked' : ''} onchange="toggleUserStatus(${u.id}, this.checked)">
                            <span class="slider"></span>
                        </label>
                        <span class="badge ${u.is_active ? 'badge-success' : 'badge-danger'}" style="margin-left:8px;">${u.is_active ? '活跃' : '禁用'}</span>
                    </td>
                    <td>${(u.last_login||'').slice(0,19).replace('T',' ') || '从未登录'}</td>
                    <td>
                        <div style="display:flex;gap:4px;">
                            <button class="small" onclick="resetPassword(${u.id}, '${u.username}')" title="重置密码">🔑</button>
                            <button class="small secondary" onclick="generateToken(${u.id})" title="生成 API Token">🔐</button>
                            <button class="small danger" onclick="deleteUser(${u.id}, '${u.username}')" title="删除">🗑️</button>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
    } catch (e) {
        showError('#users-tbody', 8, '异常: ' + e.message);
    }
}

function updateStats(users) {
    document.getElementById('stat-total').textContent = users.length;
    document.getElementById('stat-active').textContent = users.filter(u => u.is_active).length;
    document.getElementById('stat-admin').textContent = users.filter(u => u.role === 'admin').length;
    document.getElementById('stat-inactive').textContent = users.filter(u => !u.is_active).length;
}

function toggleSelectAll() {
    const checked = document.getElementById('select-all').checked;
    document.querySelectorAll('.row-select').forEach(cb => cb.checked = checked);
}

async function toggleUserStatus(id, active) {
    const res = await api(`/api/admin/users/update/${id}`, {
        method: 'POST', 
        body: JSON.stringify({is_active: active})
    });
    if (res && res.success) {
        toast(active ? '用户已启用' : '用户已禁用');
        loadUsers();
    } else {
        showErrorDetail('操作失败', '用户管理');
    }
}

function showAddUserModal() {
    showModal(`<h3>➕ 新增用户</h3>
        <div class="form-cols-2">
            <div class="form-row"><label>用户名 *</label><input id="u-username" placeholder="登录账号"></div>
            <div class="form-row"><label>密码 *</label><input id="u-password" type="password" placeholder="至少6位"></div>
        </div>
        <div class="form-cols-2">
            <div class="form-row"><label>姓名</label><input id="u-fullname" placeholder="显示名称"></div>
            <div class="form-row"><label>邮箱</label><input id="u-email" type="email" placeholder="user@company.com"></div>
        </div>
        <div class="form-row">
            <label>角色</label>
            <select id="u-role">
                <option value="admin">👑 admin - 超级管理员（全部权限）</option>
                <option value="analyst" selected>🔍 analyst - 安全分析师（告警/狩猎/响应）</option>
                <option value="auditor">📜 auditor - 审计员（只读 + 审计日志）</option>
                <option value="viewer">👁️ viewer - 只读（查看权限）</option>
            </select>
        </div>
        <div style="background:rgba(0,212,255,0.05);padding:12px;border-radius:6px;margin-top:12px;">
            <strong style="color:var(--accent);font-size:12px;">💡 角色说明</strong>
            <div id="role-desc" style="color:var(--text-muted);font-size:12px;margin-top:6px;">🔍 分析师：可处理告警、执行威胁狩猎、生成应急响应方案</div>
        </div>
        <div style="text-align:center;margin-top:20px;">
            <button onclick="submitUser()">🚀 创建用户</button>
            <button class="secondary" onclick="closeModal()">取消</button>
        </div>
    `);
    
    // 角色选择时更新说明
    document.getElementById('u-role').onchange = function() {
        const rc = roleConfig[this.value];
        document.getElementById('role-desc').textContent = rc.label + '：' + rc.desc;
    };
}

async function submitUser() {
    const data = {
        username: document.getElementById('u-username').value.trim(),
        password: document.getElementById('u-password').value,
        full_name: document.getElementById('u-fullname').value.trim(),
        email: document.getElementById('u-email').value.trim(),
        role: document.getElementById('u-role').value
    };
    if (!data.username || !data.password) { toast('用户名和密码必填', 'error'); return; }
    if (data.password.length < 6) { toast('密码至少 6 位', 'error'); return; }
    
    const res = await api('/api/admin/users/create', {method: 'POST', body: JSON.stringify(data)});
    if (res.success) { toast('✓ 用户已创建'); closeModal(); loadUsers(); }
    else showErrorDetail(res, '用户管理');
}

function resetPassword(id, username) {
    showModal(`<h3>🔑 重置 ${username} 的密码</h3>
        <div class="form-row"><label>新密码 (至少 6 位)</label><input id="new-pw" type="password" placeholder="输入新密码"></div>
        <div style="text-align:center;margin-top:20px;">
            <button onclick="doResetPw(${id})">确认重置</button>
            <button class="secondary" onclick="closeModal()">取消</button>
        </div>
    `);
}

async function doResetPw(id) {
    const password = document.getElementById('new-pw').value;
    if (password.length < 6) { toast('密码至少 6 位', 'error'); return; }
    const res = await api(`/api/admin/users/update/${id}`, {method: 'POST', body: JSON.stringify({password})});
    if (res.success) { toast('✓ 密码已重置'); closeModal(); }
    else showErrorDetail('重置失败', '用户管理');
}

async function generateToken(id) {
    const res = await api(`/api/admin/users/${id}/token`, {method: 'POST'});
    if (res.success) {
        showModal(`<h3>🔐 API Token</h3>
            <p style="color:var(--warning);font-size:13px;">⚠️ 请妥善保管，Token 不会再次显示完整内容</p>
            <div style="background:var(--bg-input);padding:15px;border-radius:6px;border:1px solid var(--border);word-break:break-all;font-family:monospace;font-size:12px;color:var(--accent);">
                ${res.token}
            </div>
            <div style="text-align:center;margin-top:16px;">
                <button onclick="navigator.clipboard.writeText('${res.token}'); toast('✓ 已复制到剪贴板')">📋 复制</button>
                <button class="secondary" onclick="closeModal()">关闭</button>
            </div>
        `);
    } else showErrorDetail('生成失败', '用户管理');
}

async function deleteUser(id, username) {
    if (!confirm(`确定删除用户 "${username}"?\n\n此操作不可恢复！`)) return;
    try {
        const res = await api(`/api/admin/users/delete/${id}`, {method: 'POST'});
        if (res && res.success) { toast('✓ 已删除'); loadUsers(); }
        else showErrorDetail(res, '用户管理');
    } catch (e) { showErrorDetail(e, '用户管理'); }
}

// CSS 动画
const style = document.createElement('style');
style.textContent = `
@keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
.toggle { position:relative; display:inline-block; width:40px; height:22px; }
.toggle input { opacity:0; width:0; height:0; }
.slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:var(--toggle-bg, var(--border)); border-radius:22px; transition:0.3s; }
.slider:before { content:""; position:absolute; height:16px; width:16px; left:3px; bottom:3px; background:white; border-radius:50%; transition:0.3s; }
input:checked + .slider { background:var(--success); }
input:checked + .slider:before { transform:translateX(18px); }
`;
document.head.appendChild(style);

loadUsers();
</script>
{% endblock %}
